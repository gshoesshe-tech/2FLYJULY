<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Expenses | 2FLY</title>
<link rel="stylesheet" href="./styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><script defer src="./common.js"></script><script defer src="./expenses.js"></script></head>
<body data-page="expenses" data-required-role="management"><div id="toast" class="toast"></div><div class="app-shell"><aside class="sidebar"><div class="side-brand"><div class="logo small">2F</div><div><strong>2FLY System</strong><span>July 2026</span></div></div><nav><a href="./dashboard.html" data-nav="dashboard" class="nav-btn ">Dashboard</a><a href="./orderpage.html" data-nav="orders" class="nav-btn ">Orders</a><a href="./inventory.html" data-nav="inventory" class="nav-btn ">Inventory</a><a href="./production.html" data-nav="production" class="nav-btn management-only">Production</a><a href="./payments.html" data-nav="payments" class="nav-btn ">Payments</a><a href="./expenses.html" data-nav="expenses" class="nav-btn management-only">Expenses</a><a href="./finance.html" data-nav="finance" class="nav-btn management-only">Finance</a><a href="./settings.html" data-nav="settings" class="nav-btn owner-only">Settings</a></nav><div class="side-user"><span id="userEmail">—</span><strong id="userRole">—</strong><button id="logoutBtn" class="btn ghost">Log out</button></div></aside>
<section class="workspace"><header class="topbar"><div><h2>Expenses</h2><p>Operating costs, refunds, and losses.</p></div><div class="top-actions"><button id="refreshBtn" class="btn">Refresh</button></div></header><section class="page active" id="page-expenses">
<div class="two-col">
<article class="card"><div class="card-head"><h3>Record business expense</h3></div>
<form class="card-body form-grid" id="expenseForm">
<label>Date<input id="expenseDate" type="date"/></label><label>Type<select id="expenseType"><option value="operating">Operating</option><option value="refund">Refund</option><option value="loss">Loss</option></select></label>
<label>Category<input id="expenseCategory" placeholder="Ads, Salary, Packaging..." required=""/></label><label>Amount<input id="expenseAmount" min="0.01" step="0.01" type="number"/></label>
<label>Cash account<select id="expenseAccount"></select></label><label>Supplier/payee<input id="expenseSupplier"/></label>
<label class="span-2">Notes<textarea id="expenseNotes"></textarea></label><button class="btn primary span-2">Save expense</button>
</form>
</article>
<article class="card"><div class="card-head"><h3>Expense summary</h3><input id="expenseMonth" type="month"/></div><div class="card-body" id="expenseSummary"></div></article>
</div>
<article class="card"><div class="card-head"><h3>Recent expenses</h3></div><div class="table-wrap" id="expensesTable"></div></article>
</section></section></div></body></html>
