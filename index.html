<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2FLY System Login</title>
<link rel="stylesheet" href="./styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><script defer src="./login.js"></script></head>
<body><main class="auth-shell"><section class="auth-hero"><span class="eyebrow">2FLY • JULY 2026 REBUILD</span><h1>Know exactly where your money and inventory go.</h1><p>Orders, verified payments, production, inventory, cash flow, and owner pay in one system.</p></section>
<section class="auth-card"><div class="logo">2F</div><h2>Team login</h2><p class="muted">Use the account created in your new Supabase project.</p><form id="loginForm" class="stack"><label>Email<input id="loginEmail" type="email" autocomplete="email" required></label><label>Password<input id="loginPassword" type="password" autocomplete="current-password" required></label><button class="btn primary" type="submit">Sign in</button><div id="loginError" class="notice danger hidden"></div></form></section></main></body></html>
