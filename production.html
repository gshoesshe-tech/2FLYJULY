<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Production | 2FLY</title>
<link rel="stylesheet" href="./styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><script defer src="./common.js"></script><script defer src="./production.js"></script></head>
<body data-page="production" data-required-role="management"><div id="toast" class="toast"></div><div class="app-shell"><aside class="sidebar"><div class="side-brand"><div class="logo small">2F</div><div><strong>2FLY System</strong><span>July 2026</span></div></div><nav><a href="./dashboard.html" data-nav="dashboard" class="nav-btn ">Dashboard</a><a href="./orderpage.html" data-nav="orders" class="nav-btn ">Orders</a><a href="./inventory.html" data-nav="inventory" class="nav-btn ">Inventory</a><a href="./production.html" data-nav="production" class="nav-btn management-only">Production</a><a href="./payments.html" data-nav="payments" class="nav-btn ">Payments</a><a href="./expenses.html" data-nav="expenses" class="nav-btn management-only">Expenses</a><a href="./finance.html" data-nav="finance" class="nav-btn management-only">Finance</a><a href="./settings.html" data-nav="settings" class="nav-btn owner-only">Settings</a></nav><div class="side-user"><span id="userEmail">—</span><strong id="userRole">—</strong><button id="logoutBtn" class="btn ghost">Log out</button></div></aside>
<section class="workspace"><header class="topbar"><div><h2>Production</h2><p>Own production pullouts and subcon receipts.</p></div><div class="top-actions"><button id="refreshBtn" class="btn">Refresh</button></div></header><section class="page active" id="page-production">
<div class="two-col">
<article class="card">
<div class="card-head"><h3>Create own-production batch</h3></div>
<form class="card-body form-grid" id="ownBatchForm">
<label>Batch number<input id="ownBatchNumber" placeholder="BOXERS-JUL-001" required=""/></label>
<label>Category<select id="ownBatchCategory"></select></label>
<label>Start date<input id="ownBatchDate" type="date"/></label>
<label>Fabric cost used<input id="ownFabricCost" min="0" step="0.01" type="number"/></label>
<label>Total pieces cut<input id="ownCutQty" min="1" step="1" type="number"/></label>
<label>Cutting rate<input id="ownCutRate" min="0" step="0.01" type="number"/></label>
<label>Exact garters assigned<input id="ownGarterQty" min="0" step="1" type="number"/></label>
<label>Sewer rate per completed piece<input id="ownSewerRate" min="0" step="0.01" type="number"/></label>
<label>Cash account<select id="ownBatchAccount"></select></label>
<label class="span-2">Notes<textarea id="ownBatchNotes"></textarea></label>
<button class="btn primary span-2">Create production batch</button>
</form>
</article>
<article class="card">
<div class="card-head"><h3>Record pullout</h3></div>
<form class="card-body form-grid" id="pulloutForm">
<label>Batch<select id="pulloutBatch"></select></label><label>Date<input id="pulloutDate" type="date"/></label>
<label>Completed pieces<input id="pulloutQty" min="1" step="1" type="number"/></label><label>Sewer rate<input id="pulloutSewerRate" min="0" step="0.01" type="number"/></label>
<label>Rejected on final pullout<input id="pulloutRejects" min="0" step="1" type="number" value="0"/></label><label>Paid from<select id="pulloutAccount"></select></label>
<label class="span-2">SKU distribution (one per line: <code>CK-OG-B 500</code>)<textarea id="pulloutDistribution"></textarea></label>
<label class="check span-2"><input id="pulloutFinal" type="checkbox"/> This is the final pullout</label>
<label class="span-2">Notes<textarea id="pulloutNotes"></textarea></label>
<button class="btn primary span-2">Add pullout and inventory</button>
</form>
</article>
</div>
<article class="card"><div class="card-head"><h3>Production batches</h3></div><div class="table-wrap" id="productionTable"></div></article>
<article class="card">
<div class="card-head"><h3>Receive subcon finished goods</h3></div>
<form class="card-body form-grid cols-4" id="subconForm">
<label>Batch number<input id="subconBatchNumber" required=""/></label><label>Category<select id="subconCategory"></select></label>
<label>Received date<input id="subconDate" type="date"/></label><label>Partner<input id="subconPartner" required=""/></label>
<label>Quantity received<input id="subconQty" min="1" step="1" type="number"/></label><label>Fixed price per piece<input id="subconPrice" min="0.01" step="0.01" type="number"/></label>
<label>Direct handling<input id="subconHandling" min="0" step="0.01" type="number" value="0"/></label><label>Amount paid now<input id="subconPaid" min="0" step="0.01" type="number" value="0"/></label>
<label>Paid from<select id="subconAccount"></select></label><label class="span-3">SKU distribution for design-tracked categories<textarea id="subconDistribution"></textarea></label>
<label class="span-4">Notes<textarea id="subconNotes"></textarea></label>
<button class="btn primary span-4">Receive subcon inventory</button>
</form>
</article>
</section></section></div></body></html>
